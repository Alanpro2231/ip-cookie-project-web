<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de administración - Datos registrados</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .card {
      background: white;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin: 0 0 0.6rem 0;
      font-size: 1rem;
      color: #2c3e50;
    }
    .card table {
      margin: 0;
    }
    .card td {
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      border-bottom: 1px solid #eee;
    }
    .card td:first-child {
      color: #666;
      width: 40%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Datos registrados</h1>
    <p>Información recogida al aceptar las cookies (uso académico - ciberseguridad)</p>
  </header>

  <main style="max-width: 900px;">
    <div id="lista">Cargando...</div>
  </main>

  <script>
    fetch('/api/registros')
      .then(res => res.json())
      .then(data => {
        const cont = document.getElementById('lista');
        if (data.registros.length === 0) {
          cont.innerHTML = '<p>Todavía no hay registros</p>';
          return;
        }
        cont.innerHTML = data.registros.map((r, i) => {
          const filas = Object.entries(r).map(([clave, valor]) =>
            `<tr><td>${clave}</td><td>${valor === null ? '-' : valor}</td></tr>`
          ).join('');
          return `<div class="card"><h3>Registro #${i + 1}</h3><table>${filas}</table></div>`;
        }).join('');
      });
  </script>
</body>
</html>
